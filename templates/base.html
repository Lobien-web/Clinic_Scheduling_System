<!doctype html>
<html lang="en">
<style>
  .leaflet-container {
    z-index: 0 !important;
  }
</style>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <title>{% block title %}Home{% endblock %}</title>
</head>

  <!-- Top bar -->
  <header class="fixed top-0 left-0 right-0 h-16 bg-blue-700  shadow-xl z-50">
    <div class=" mx-2 h-full px-4 flex items-center justify-between h-full">

      {% if user.is_authenticated %}
      <div class="text-white font-medium">
        <a href="/dashboard">Hi, {{ user.username }}</a>
      </div>

      <div class="flex items-center justify-between w-1/4 text-white">
        <a href="/appointment/set_schedule">Book</a>
        <a href="/doctors">Doctors</a>
        <form method="post" action="{% url 'logout' %}">
          {% csrf_token %}
          <button type="submit" class="px-4 py-2 rounded-lg text-white hover:bg-blue-700 transition">
            Logout
          </button>
        </form>
      </div>
    {% else %}

      <div class="text-xl font-bold text-white">
        <a href="/">Clinic System</a>
      </div>

      <div>
      <a href="/registerlanding" class="px-4 py-2 rounded-lg text-white hover:bg-blue-700 transition">
        Register
      </a>

      <a href=" {% url 'login' %}" class="px-4 py-2 rounded-lg text-white hover:bg-blue-700 transition">
        Login
      </a>

     
      </div>
    </div>
 {% endif %}

    </div>
  </header>


  <main class="w-full h-full">
    <div class="items-center flex flex-col ">
      {% block content %}{% endblock %}
    </div>
  </main>

</body>

</html>
