{% extends "base.html" %}
{% block title %}Appointment{% endblock %}

{% block content %}
<div class="flex w-full h-full">
  <div class="min-h-screen flex items-center w-full gap-2 px-4">
    <div class="flex flex-col p-8 w-1/2">
      <h1 class="text-3xl font-bold text-center  mb-6">
        Request a Schedule
      </h1>




      <form action="{% url 'push_schedule' %}" method="POST" class="">
        {% csrf_token %}

        <div class="gap-2 flex flex-col">
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Available Doctors
          </label>
          <select name="doctor" id="avail_doctor" class="w-full px-4 py-2 border border-gray-300 rounded-xl shadow-sm
                 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition">
            <option disabled selected>Select Doctor</option>
            {% for d in doctor %}
            <option value="{{ d.id }}" data-lat="{{ d.clinic_latitude }}" data-lng="{{ d.clinic_longitude }}"
              data-days="{{ d.doctor_available_days|join:',' }}" data-timestart="{{ d.doctor_schedule_time_start }}"
              data-timeend="{{ d.doctor_schedule_time_end }}" data-clinic="{{ d.clinic_name|default:d.doctor_name }}">
              {{ d.doctor_name }}
            </option>
            {% endfor %}
          </select>
          <p class="text-sm text-gray-700">
            <span class="font-semibold">Available days:</span>
            <span id="doc_days">-</span>
          </p>
          <p class="text-sm text-gray-700 mt-1">
            <span class="font-semibold">Available time:</span>
            <span id="doc_time">-</span>
          </p>



          <label class="block text-sm font-medium text-gray-700 mb-1">
            Date
          </label>
          <input type="date" name="sched_date" class="w-full px-4 py-2 border border-gray-300 rounded-xl shadow-sm
                 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition" />

        </div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Time
        </label>
        <div class="flex gap-2">




          <input type="time" name="sched_time" class="w-full px-4 py-2 border border-gray-300 rounded-xl shadow-sm
                 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition" />


          <button type="submit" class="w-full bg-blue-600 text-white font-semibold py-3 rounded-xl
               hover:bg-blue-700 active:scale-95 transition duration-200 shadow-md">

            Book Appointment
          </button>
        </div>
    </div>




    </form>

  </div>

  <div class="w-1/2 fixed right-0 top-1/2 -translate-y-1/2 p-8">
    <div id="map" class="w-full h-96 rounded-xl shadow"></div>
  </div>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([14.5995, 120.9842], 12);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    let marker = null;
    const doctorSelect = document.getElementById('avail_doctor');

    const infoBox = document.getElementById('doctor_info');
    const daysEl = document.getElementById('doc_days');
    const timeEl = document.getElementById('doc_time');

    const DAY_LABELS = {
      mon: "Monday",
      tue: "Tuesday",
      wed: "Wednesday",
      thu: "Thursday",
      fri: "Friday",
      sat: "Saturday",
      sun: "Sunday",
    };

    doctorSelect.addEventListener('change', () => {
      const opt = doctorSelect.options[doctorSelect.selectedIndex];

      const lat = parseFloat(opt.dataset.lat);
      const lng = parseFloat(opt.dataset.lng);
      const clinic = opt.dataset.clinic || "Clinic Location";

      if (Number.isFinite(lat) && Number.isFinite(lng)) {
        map.setView([lat, lng], 15);
        if (marker) map.removeLayer(marker);
        marker = L.marker([lat, lng]).addTo(map).bindPopup(clinic).openPopup();
      }


      const daysCsv = (opt.dataset.days || "").trim();
      const dayCodes = daysCsv ? daysCsv.split(",").map(s => s.trim()).filter(Boolean) : [];
      const dayNames = dayCodes.map(code => DAY_LABELS[code] || code);

      const start = opt.dataset.timestart || "";
      const end = opt.dataset.timeend || "";
      const clean = (t) => (t || "").slice(0, 5); // "08:00:00" -> "08:00"
      timeEl.textContent = (start && end) ? `${clean(start)} - ${clean(end)}` : "No time set";
      daysEl.textContent = dayNames.length ? dayNames.join(", ") : "No schedule set";
      timeEl.textContent = (start && end) ? `${start} - ${end}` : "No time set";

      infoBox.classList.remove("hidden");
    });

    setTimeout(() => map.invalidateSize(), 200);
  </script>
</div>

{% endblock %}
