{% extends "base.html" %}

{% block content %}
<div class="h-full w-full pt-20">
  <div class="max-w-2xl mx-auto p-4">
    <ul class="space-y-4">
      {% for d in DoctorList %}
        <li class="p-4 border flex rounded-lg shadow-xl ">
            {% if d.doctor_img %}
            <img src="{{ d.doctor_img.url }}" alt="Profile picture" class="border border-blue w-24 h-24 object-cover rounded-full mt-2">
          {% endif %}
          <div class="flex flex_col">
            <b>{{ d.doctor_name }}</b>  {{ d.doctor_role }} — {{ d.doctor_age }}
            
          </div>

          
        </li>
      {% empty %}
        <li>No doctors found.</li>
      {% endfor %}
    </ul>
  </div>
</div>
{% endblock %}
