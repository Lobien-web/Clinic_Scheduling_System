
{% extends "base.html" %}
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://cdn.tailwindcss.com"></script>
        <title>Document</title>
    </head>
    <body>
        <ul>
            {%for d in DoctorList %}
            <li>
                {{d.doctor_name}} - {{d.doctor_role}} - {{d.doctor_age}} - 
                <img src={{d.doctor_img.url}} alt="Profile picture">

             <li>

                <img src={{d.doctor_img.url}} alt="Profile picture">
            </li>
            {% endfor %}
        </ul>
    </html>
