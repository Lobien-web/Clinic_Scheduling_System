{% extends "base.html" %}
{% block content %}

<div class="flex pt-24 pb-24 left-0  flex-col w-1/2 justify-center items-center min-h-screen shadow-xl">


   <form class="w-full" action=" {% url 'PushRegisterPage' %}" enctype="multipart/form-data" method="POST" {% csrf_token
      %} <div class="w-full flex flex-col items-center ">
      <div class="flex flex-col gap-4 w-full p-20">
         <h2 class="text-center  text-2xl font-bold ">Register</h2>
         <div class="grid grid-cols-2 gap-4 w-full">

            <div class="flex flex-col">
               <p>Username</p>
               <input class="w-full px-4 py-2 border border-gray-300 rounded-lg 
               focus:outline-none focus:ring-2 focus:ring-blue-500 
               focus:border-blue-500 transition" name="username" type="text">
            </div>
            <div class="flex flex-col">
               <p>Email</p>
               <input class="w-full px-4 py-2 border border-gray-300 rounded-lg 
               focus:outline-none focus:ring-2 focus:ring-blue-500 
               focus:border-blue-500 transition" name="email" type="email">
            </div>
            <div class="flex flex-col">
               <p>Password</p>
               <input class="w-full px-4 py-2 border border-gray-300 rounded-lg 
               focus:outline-none focus:ring-2 focus:ring-blue-500 
               focus:border-blue-500 transition" name="password" type="password">
            </div>
            <div class="flex flex-col">
               <p>Confirm Password</p>
               <input class="w-full px-4 py-2 border border-gray-300 rounded-lg 
               focus:outline-none focus:ring-2 focus:ring-blue-500 
               focus:border-blue-500 transition" name="password_conf" type="password">
            </div>


         </div>
         <h3 class="text-center text-lg mt-4 font-bold">Patient Details</h3>
         <p>First name</p>
         <input class="w-full px-4 py-2 border border-gray-300 rounded-lg 
         focus:outline-none focus:ring-2 focus:ring-blue-500 
         focus:border-blue-500 transition" name="firstname" type="text">
         <p>Last name</p>
         <input class="w-full px-4 py-2 border border-gray-300 rounded-lg 
         focus:outline-none focus:ring-2 focus:ring-blue-500 
         focus:border-blue-500 transition" name="lastname" type="text">
         <p>Age</p>
         <input class="w-full px-4 py-2 border border-gray-300 rounded-lg 
         focus:outline-none focus:ring-2 focus:ring-blue-500 
         focus:border-blue-500 transition" name="age" type="number">
         <p>Upload Image</p>
         <input class="" name="pat_img" type="file">


         <input
            class="hover: cursor-pointer border w-1/3 p-2 mt-4 border-transparent shadow-lg hover:shadow-xl rounded-xl text-white font-bold bg-blue-500"
            type="submit">
      </div>


</div>
</form>
</div>
{% endblock content %}
