<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <title>{% block title %}Home{% endblock %}</title>
</head>

<body class="min-h-screen  pb-24 pt-24 bg-zinc-100">

  <!-- Top bar -->
  <header class="fixed top-0 left-0 right-0 h-16 bg-blue-700  shadow-xl z-50">

    </div>

    <div class="max-w-6xl mx-auto h-full px-4 flex items-center justify-between">

      {% if user.is_authenticated %}
      <div class="text-white font-medium">
        Hi, {{ user.username }}
      </div>

      <form method="post" action="{% url 'logout' %}">
        {% csrf_token %}
        <button type="submit" class="px-4 py-2 rounded-lg text-white hover:bg-blue-700 transition">
          Logout
        </button>

      </form>

      {% else %}

      <div class="text-xl font-bold text-white">
        <a href="/">Clinic System</a>
      </div>

      <a href=" {% url 'login' %}" class="px-4 py-2 rounded-lg text-white hover:bg-blue-700 transition">
        Login
      </a>
      {% endif %}

    </div>

    <div
      class="flex text-white font-semibold flex-col items-center h-screen w-1/6 bg-blue-700 pt-12 gap-4 shadow-xl x-50">
      <a href="">button1</a>
      <a href="">button1</a>
      <a href="">button1</a>
      <a href="">button1</a>

    </div>

  </header>

  <main class="">



    <div class="items-center flex flex-col  ">

      {% block content %}{% endblock %}
    </div>
  </main>

</body>

</html>
