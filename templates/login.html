{% extends "base.html" %}
{% block content %}

<div class="flex w-full   justify-center min-h-screen">

  <div
    class="fixed right-0 items-center flex h-screen w-1/3 flex-col p-20 gap-2 bg-zinc-100 border border-transparent shadow-xl rounded-xl mt-4  justify-center">
    
  <h2 class="text-2xl font-bold">Login</h2>

    {% if form.errors %}
    <p style="color: red">Invalid username or password</p>
    <script src="https://cdn.tailwindcss.com"></script>
    {% endif %}

    <form method="post" class=" flex flex-col items-center w-full p-4">
      {% csrf_token %}

      <div class="flex flex-col w-full">
        <label class="block font-semibold mb-1">Username</label>
        {{ form.username }}



        <label class="block font-semibold mb-1">Password</label>
        {{ form.password }}
      </div>



      <button type="submit" class="w-1/2 p-2 mt-12 bg-blue-500 text-white font-bold rounded-lg hover:bg-blue-600">
        Login
      </button>
    </form>
  </div>
</div>
{% endblock content %}
